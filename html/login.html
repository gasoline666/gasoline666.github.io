<head>

<body>

	<script>
		document.getElementById('login-button').addEventListener('click', function(e) {
			e.preventDefault();
			var name = document.getElementById('userName').value;
			var pwd = document.getElementById('pwd').value;
			if (name !== '曹诗雨') {
				alert('名字不对哦！');
			} else if (pwd !== '0718') {
				alert('密码错了！再想想叭乖乖～');

				window.location.href = '../html/index1.html';
			}
		});
